name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Type-check (runs on every push/PR)
  # ─────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # Auto-tag: read version from package.json, create tag if it doesn't exist yet
  # ─────────────────────────────────────────────────────────────────────────────
  auto-tag:
    name: Auto tag from package.json
    needs: typecheck
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag_created: ${{ steps.create-tag.outputs.tag_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create tag if it doesn't exist
        id: create-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.get-version.outputs.version }}"
          if git ls-remote --tags origin "$VERSION" | grep -q "$VERSION"; then
            echo "Tag $VERSION already exists — skipping release"
            echo "tag_created=false" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$VERSION"
            git push origin "$VERSION"
            echo "Tag $VERSION created"
            echo "tag_created=true" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Build & publish Electron installers (only when a new tag was just created)
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Release — ${{ matrix.os }}
    needs: auto-tag
    if: needs.auto-tag.outputs.tag_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject .env for packaged app (Unix)
        if: runner.os != 'Windows'
        run: |
          printf 'MONGODB_URI=mongodb+srv://Vercel-Admin-atlas-bole-drum:VdbAV9Wt4XDKbNgs@atlas-bole-drum.81ktiub.mongodb.net/projectm?retryWrites=true&w=majority\n' > .env

      - name: Inject .env for packaged app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Content -Path .env -Value 'MONGODB_URI=mongodb+srv://Vercel-Admin-atlas-bole-drum:VdbAV9Wt4XDKbNgs@atlas-bole-drum.81ktiub.mongodb.net/projectm?retryWrites=true&w=majority' -NoNewline

      - name: Build Vite (web assets)
        env:
          ELECTRON: '1'
        run: npx vite build

      - name: Build & publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} --publish always

      - name: Upload artifacts (fallback on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: release/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish: mark draft → public after all platform builds succeed
  # ─────────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish release
    needs: [auto-tag, release]
    runs-on: ubuntu-latest
    if: needs.auto-tag.outputs.tag_created == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Mark release as published (non-draft, latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.auto-tag.outputs.version }}"
          gh release edit "$TAG" --draft=false --latest
          echo "Released $TAG as public ✓"
