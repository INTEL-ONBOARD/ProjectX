appId: com.projectm.app
productName: ProjectM
copyright: Copyright © 2024 ProjectM

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - electron/**/*.js
  - node_modules/**/*
  - package.json

asar: true

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  identity: null

win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Office

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish:
  provider: github
  owner: INTEL-ONBOARD
  repo: ProjectM
  releaseType: release
