appId: com.intel-onboard.projectm
productName: Project M
copyright: Copyright © 2024 Project M

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - electron/**/*.js
  - node_modules/**/*
  - package.json

extraResources:
  - from: .env
    to: .env

asar: true

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  identity: null

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Office

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: true

publish:
  provider: github
  owner: INTEL-ONBOARD
  repo: ProjectX
  releaseType: release
