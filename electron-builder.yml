appId: com.projectx.app
productName: ProjectX
copyright: Copyright © 2024 ProjectX

directories:
  buildResources: build
  output: dist-electron

files:
  - dist/**/*
  - electron/**/*.js
  - package.json

asar: true

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
  publisherName: ProjectX

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Office

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish:
  provider: github
  owner: ${env.GITHUB_REPOSITORY_OWNER}
  repo: ${env.GITHUB_REPOSITORY_NAME}
  releaseType: release
